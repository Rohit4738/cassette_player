name: Auto-merge Copilot PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    # Run every 15 minutes to catch any open Copilot PRs
    # Remove or disable this workflow once no longer needed
    - cron: '*/15 * * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Find and auto-merge open Copilot PRs
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const copilotActors = ['copilot[bot]', 'github-copilot[bot]', 'copilot'];

            const { data: pullRequests } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            for (const pr of pullRequests) {
              const author = pr.user.login;
              if (!copilotActors.includes(author)) {
                console.log(`Skipping PR #${pr.number} by ${author}`);
                continue;
              }

              console.log(`Processing PR #${pr.number} by ${author}: "${pr.title}"`);

              // Approve the PR
              try {
                await github.rest.pulls.createReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  event: 'APPROVE',
                  body: 'Auto-approved by auto-merge-copilot-prs workflow.',
                });
                console.log(`Approved PR #${pr.number}`);
              } catch (err) {
                console.log(`Could not approve PR #${pr.number}: ${err.message}`);
              }

              // Enable auto-merge (squash)
              try {
                await github.graphql(`
                  mutation($pullRequestId: ID!) {
                    enablePullRequestAutoMerge(input: {
                      pullRequestId: $pullRequestId,
                      mergeMethod: SQUASH
                    }) {
                      pullRequest { number }
                    }
                  }
                `, { pullRequestId: pr.node_id });
                console.log(`Enabled auto-merge on PR #${pr.number}`);
              } catch (err) {
                console.log(`Auto-merge not available for PR #${pr.number}: ${err.message}`);
              }

              // Attempt a direct merge as fallback
              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'squash',
                });
                console.log(`Merged PR #${pr.number}`);
              } catch (err) {
                console.log(`Could not merge PR #${pr.number} yet: ${err.message}`);
              }
            }

      - name: Auto-merge this Copilot PR
        if: >
          github.event_name == 'pull_request' &&
          (github.event.pull_request.user.login == 'copilot[bot]' ||
           github.event.pull_request.user.login == 'github-copilot[bot]' ||
           github.event.pull_request.user.login == 'copilot')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            console.log(`Processing PR #${pr.number} by ${pr.user.login}: "${pr.title}"`);

            // Approve the PR
            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                event: 'APPROVE',
                body: 'Auto-approved by auto-merge-copilot-prs workflow.',
              });
              console.log(`Approved PR #${pr.number}`);
            } catch (err) {
              console.log(`Could not approve PR #${pr.number}: ${err.message}`);
            }

            // Enable auto-merge (squash)
            try {
              await github.graphql(`
                mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: SQUASH
                  }) {
                    pullRequest { number }
                  }
                }
              `, { pullRequestId: pr.node_id });
              console.log(`Enabled auto-merge on PR #${pr.number}`);
            } catch (err) {
              console.log(`Auto-merge not available for PR #${pr.number}: ${err.message}`);
            }

            // Attempt a direct merge as fallback
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash',
              });
              console.log(`Merged PR #${pr.number}`);
            } catch (err) {
              console.log(`Could not merge PR #${pr.number} yet: ${err.message}`);
            }
